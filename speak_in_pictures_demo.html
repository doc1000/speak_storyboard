<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speak in Pictures Demo</title>
  <style>
    :root {
      --bg-deep: #1a1510;
      --bg-card: #252018;
      --bg-panel: #2c231c;
      --text: #e8e0d5;
      --text-muted: #a89888;
      --brass: #b89a6b;
      --brass-dim: rgba(184, 154, 107, 0.35);
      --accent-warm: #4a3228;
      --slot-border: rgba(184, 154, 107, 0.25);
      --error: #e8a898;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #2a2218 0%, var(--bg-deep) 48%, #0f0c0a 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
      width: 100%;
      max-width: none;
      margin: 0 auto;
      padding: 10px 6px 36px;
    }

    .app-main {
      flex: 1;
      min-width: 0;
    }

    .app-main.ribbon-locked {
      pointer-events: none;
      opacity: 0.62;
      filter: grayscale(0.12);
      user-select: none;
    }

    .tab-bar {
      display: flex;
      flex-direction: column;
      flex: 0 0 auto;
      gap: 6px;
      margin-bottom: 0;
      padding: 6px;
      min-width: 84px;
      align-self: stretch;
      background: rgba(0, 0, 0, 0.22);
      border-radius: 14px;
      border: 1px solid var(--brass-dim);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .tab-bar-tabs {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tab-bar-spacer {
      flex: 1 1 auto;
      min-height: 12px;
    }

    .tab-bar-tabs button {
      flex: 0 0 auto;
      width: 100%;
      font-family: Georgia, serif;
      font-size: 16px;
      padding: 12px 10px;
      margin: 0;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .tab-bar-tabs button:hover {
      color: var(--text);
      background: rgba(184, 154, 107, 0.08);
    }

    .tab-bar-tabs button:focus-visible {
      outline: 2px solid var(--brass);
      outline-offset: 2px;
    }

    .tab-bar-tabs button.tab-active {
      background: linear-gradient(180deg, rgba(184, 154, 107, 0.22) 0%, rgba(40, 32, 26, 0.9) 100%);
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }

    .ribbon-lock-btn {
      flex: 0 0 auto;
      width: 100%;
      font-size: 20px;
      line-height: 1;
      padding: 12px 8px;
      margin: 0;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
    }

    .ribbon-lock-btn:hover {
      color: var(--text);
      background: rgba(184, 154, 107, 0.08);
    }

    .ribbon-lock-btn:focus-visible {
      outline: 2px solid var(--brass);
      outline-offset: 2px;
    }

    .ribbon-lock-btn.ribbon-lock-pressing {
      background: rgba(184, 154, 107, 0.22);
      color: var(--text);
    }

    .tab-panel[hidden] {
      display: none !important;
    }

    .demo-card, .planner-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 16px 6px;
      border: 1px solid var(--brass-dim);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      margin-bottom: 18px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 4px;
    }

    .controls-grow {
      flex: 1 1 180px;
      min-width: 0;
    }

    #phraseInput {
      width: 100%;
      font-size: 18px;
      line-height: 1.35;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--brass-dim);
      resize: none;
      min-height: calc(1.35em + 28px);
      max-height: calc(1.35em + 28px);
      overflow-y: auto;
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg-panel);
      color: var(--text);
    }

    #phraseInput::placeholder {
      color: var(--text-muted);
    }

    #phraseInput:focus {
      outline: none;
      border-color: var(--brass);
      box-shadow: 0 0 0 2px rgba(184, 154, 107, 0.2);
    }

    #micBtn {
      font-size: 20px;
      padding: 12px 14px;
      cursor: pointer;
      flex: 0 0 auto;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .controls .btn-primary {
      flex: 0 0 auto;
      align-self: stretch;
      white-space: nowrap;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      align-items: flex-start;
      margin-bottom: 4px;
      min-height: 0;
    }

    .speech-status {
      font-size: 14px;
      color: var(--text-muted);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app-status {
      font-size: 14px;
      color: var(--text-muted);
      font-family: Arial, Helvetica, sans-serif;
      flex: 1 1 auto;
      min-width: 0;
    }

    .app-status.is-error {
      color: var(--error);
    }

    button {
      font-size: 18px;
      padding: 16px 22px;
      border: 1px solid var(--brass-dim);
      border-radius: 14px;
      background: var(--accent-warm);
      color: var(--text);
      cursor: pointer;
      font-family: Georgia, serif;
    }

    button:hover {
      background: #5a4034;
    }

    button:focus-visible {
      outline: 2px solid var(--brass);
      outline-offset: 2px;
    }

    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .quick-buttons button {
      background: rgba(184, 154, 107, 0.12);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      border-color: var(--brass-dim);
    }

    .quick-buttons button:hover {
      background: rgba(184, 154, 107, 0.22);
    }

    .storyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .panel {
      min-height: 365px;
      background: var(--bg-panel);
      border: 1px solid var(--brass-dim);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      transition: transform 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .panel:hover { transform: translateY(-2px); }

    .step {
      font-size: 15px;
      color: var(--text-muted);
      align-self: flex-start;
      font-family: Arial, Helvetica, sans-serif;
    }

    .scene {
      font-size: 96px;
      line-height: 1.1;
      margin-top: 14px;
    }

    .panel-img {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      max-height: 333px;
      margin: 10px 0;
    }

    .activity-thumb {
      width: 100%;
      border-radius: 8px;
      max-height: 80px;
      object-fit: cover;
      margin-bottom: 4px;
    }

    .phrase-history-row {
      display: flex;
      align-items: stretch;
      gap: 6px;
      margin-bottom: 6px;
    }

    .phrase-history-toggle {
      flex: 0 0 auto;
      align-self: flex-start;
      font-size: 13px;
      font-family: Arial, Helvetica, sans-serif;
      padding: 6px 11px;
      margin: 0;
      width: auto;
      white-space: nowrap;
      background: rgba(184, 154, 107, 0.12);
      border: 1px solid var(--brass-dim);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1.2;
    }

    .phrase-history-toggle.is-shrunk {
      padding: 2px 5px;
      min-width: 0;
      font-size: 12px;
      line-height: 1;
    }

    .phrase-history-toggle.is-shrunk .phrase-history-label {
      display: none;
    }

    .phrase-history-toggle:hover {
      background: rgba(184, 154, 107, 0.2);
      color: var(--text);
    }

    .phrase-history-toggle:focus-visible {
      outline: 2px solid var(--brass);
      outline-offset: 2px;
    }

    .collapsible-wrap {
      overflow: hidden;
      flex: 1 1 auto;
      min-width: 0;
      max-height: 72px;
      transition: max-height 0.3s ease, opacity 0.2s ease;
      margin-bottom: 0;
      opacity: 1;
    }

    .collapsible-wrap.is-collapsed {
      max-height: 0;
      opacity: 0;
      margin: 0;
      pointer-events: none;
    }

    .quick-buttons.collapsible-inner {
      margin-bottom: 0;
      max-height: 72px;
      overflow-y: auto;
      gap: 6px;
      padding: 2px 0;
    }

    .quick-buttons.compact-chips button {
      font-size: 12px;
      padding: 5px 9px;
      border-radius: 8px;
    }

    .history-strip {
      display: flex;
      flex-direction: row;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 4px 14px;
      margin-bottom: 16px;
      scroll-snap-type: x mandatory;
    }

    .history-strip-card {
      flex: 0 0 140px;
      width: 140px;
      background: var(--bg-panel);
      border: 1px solid var(--brass-dim);
      border-radius: 16px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: grab;
      user-select: none;
      scroll-snap-align: start;
    }

    .history-strip-card:active { cursor: grabbing; }

    .history-strip-card img {
      width: 100%;
      border-radius: 10px;
      max-height: 100px;
      object-fit: cover;
      margin-bottom: 6px;
    }

    .history-strip-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: bold;
      line-height: 1.2;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      font-family: Arial, Helvetica, sans-serif;
    }

    .caption {
      font-size: 22px;
      font-weight: bold;
      margin-top: 14px;
    }

    .spoken {
      font-size: 16px;
      color: var(--text-muted);
      margin-top: 8px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 22px;
    }

    .choice {
      background: rgba(120, 140, 100, 0.15);
      border: 1px solid rgba(160, 185, 130, 0.35);
      border-radius: 16px;
      padding: 14px 26px;
      font-size: 22px;
      font-weight: bold;
    }

    .planner-title-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .small-button {
      font-size: 16px;
      padding: 12px 18px;
      background: rgba(184, 154, 107, 0.12);
      color: var(--text);
      border: 1px solid var(--brass-dim);
    }

    .small-button:hover {
      background: rgba(184, 154, 107, 0.22);
    }

    .activity-card {
      width: 150px;
      min-height: 92px;
      background: var(--bg-panel);
      border: 1px solid var(--brass-dim);
      border-radius: 16px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: grab;
      user-select: none;
    }

    .activity-card:active { cursor: grabbing; }

    .activity-emoji {
      font-size: 38px;
      margin-bottom: 6px;
    }

    .activity-label {
      font-size: 15px;
      font-weight: bold;
      line-height: 1.15;
      font-family: Arial, Helvetica, sans-serif;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .slot {
      min-height: 230px;
      border: 2px dashed var(--slot-border);
      border-radius: 20px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.18);
    }

    .slot.drag-over {
      background: rgba(100, 120, 80, 0.12);
      border-color: rgba(160, 185, 130, 0.45);
    }

    .slot-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
      text-align: center;
    }

    .slot-help {
      color: var(--text-muted);
      text-align: center;
      margin-top: 36px;
      font-size: 16px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .slot .activity-card {
      width: auto;
      min-height: 110px;
      margin-bottom: 10px;
    }

    @media (max-width: 820px) {
      .storyboard, .slots {
        grid-template-columns: 1fr;
      }
      .controls {
        flex-direction: column;
      }
      .controls .btn-primary {
        width: 100%;
      }
      #micBtn {
        width: 100%;
      }
      .planner-title-row {
        justify-content: stretch;
      }
      .planner-title-row .small-button {
        width: 100%;
      }
      .phrase-history-row {
        flex-wrap: wrap;
      }
      .collapsible-wrap:not(.is-collapsed) {
        flex: 1 1 100%;
        max-height: 96px;
      }
    }

    @media (max-width: 640px) {
      .app {
        flex-direction: column;
        gap: 10px;
      }
      .tab-bar {
        flex-direction: row;
        flex-wrap: nowrap;
        width: 100%;
        min-width: 0;
        align-self: stretch;
        align-items: stretch;
      }
      .tab-bar-tabs {
        flex-direction: row;
        flex: 1 1 auto;
        gap: 6px;
        min-width: 0;
      }
      .tab-bar-tabs button {
        flex: 1;
      }
      .tab-bar-spacer {
        display: none;
      }
      .ribbon-lock-btn {
        width: auto;
        min-width: 48px;
        flex: 0 0 auto;
        align-self: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="tab-bar">
      <div class="tab-bar-tabs" role="tablist" aria-label="Main sections">
        <button type="button" id="tabSpeak" class="tab-active" role="tab" aria-selected="true" aria-controls="panelSpeak" onclick="setMainTab('speak')">Speak</button>
        <button type="button" id="tabPlan" role="tab" aria-selected="false" aria-controls="panelPlan" onclick="setMainTab('plan')">Plan</button>
      </div>
      <div class="tab-bar-spacer" aria-hidden="true"></div>
      <button type="button"
        id="ribbonLockBtn"
        class="ribbon-lock-btn"
        title="Hold 1 second to lock screen"
        aria-label="Hold one second to lock the main screen and prevent accidental touches."
        aria-pressed="false">🔒</button>
    </div>

    <div class="app-main">
      <div id="panelSpeak" class="tab-panel" role="tabpanel" aria-labelledby="tabSpeak">
        <section class="demo-card">
          <div class="controls">
            <button type="button" id="micBtn" onclick="startSpeech()" title="Speak phrase">🎙</button>
            <div class="controls-grow">
              <textarea id="phraseInput" rows="1" aria-label="Caregiver phrase">Gramma, we have to pay the lawn guy for mowing the lawn. Let's write a check for $50. Where is your checkbook?</textarea>
            </div>
            <button type="button" class="btn-primary" onclick="generateStoryboard()">Make Storyboard</button>
          </div>
          <div class="status-row">
            <span id="speechStatus" class="speech-status"></span>
            <span id="appStatus" class="app-status" aria-live="polite"></span>
          </div>

          <div class="phrase-history-row">
            <button type="button" id="phraseHistoryToggle" class="phrase-history-toggle" aria-expanded="true" aria-controls="quickButtonsWrap" title="Past phrases" aria-label="Toggle list of past phrases">
              <span class="phrase-history-label">Past phrases </span><span id="phraseHistoryChevron" class="phrase-history-chevron" aria-hidden="true">▼</span>
            </button>
            <div id="quickButtonsWrap" class="collapsible-wrap">
              <div id="quickButtons" class="quick-buttons collapsible-inner compact-chips"></div>
            </div>
          </div>

          <div id="storyboard" class="storyboard"></div>
          <div id="choices"></div>
        </section>
      </div>

      <div id="panelPlan" class="tab-panel" role="tabpanel" aria-labelledby="tabPlan" hidden>
        <section class="planner-card">
          <div class="planner-title-row">
            <button type="button" class="small-button" onclick="resetPlanner()">Reset Plan</button>
          </div>

          <div id="historyStrip" class="history-strip"></div>

          <div class="slots">
            <div id="morningSlot" class="slot" ondragover="allowDrop(event)" ondragleave="leaveDrop(event)" ondrop="dropActivity(event, 'morningSlot')">
              <div class="slot-title">Morning</div>
              <div class="slot-help">Drop activity here</div>
            </div>
            <div id="afternoonSlot" class="slot" ondragover="allowDrop(event)" ondragleave="leaveDrop(event)" ondrop="dropActivity(event, 'afternoonSlot')">
              <div class="slot-title">Afternoon</div>
              <div class="slot-help">Drop activity here</div>
            </div>
            <div id="eveningSlot" class="slot" ondragover="allowDrop(event)" ondragleave="leaveDrop(event)" ondrop="dropActivity(event, 'eveningSlot')">
              <div class="slot-title">Evening</div>
              <div class="slot-help">Drop activity here</div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    let currentScenario = null;
    let activityCounter = 0;
    let historyItems = [];

    function setMainTab(which) {
      const speak = document.getElementById('panelSpeak');
      const plan = document.getElementById('panelPlan');
      const btnSpeak = document.getElementById('tabSpeak');
      const btnPlan = document.getElementById('tabPlan');
      const isSpeak = which === 'speak';
      speak.hidden = !isSpeak;
      plan.hidden = isSpeak;
      btnSpeak.classList.toggle('tab-active', isSpeak);
      btnPlan.classList.toggle('tab-active', !isSpeak);
      btnSpeak.setAttribute('aria-selected', isSpeak);
      btnPlan.setAttribute('aria-selected', !isSpeak);
    }

    function setAppStatus(text, isError) {
      const el = document.getElementById('appStatus');
      el.textContent = text || '';
      el.classList.toggle('is-error', !!isError);
    }

    function togglePhraseHistory() {
      const wrap = document.getElementById('quickButtonsWrap');
      const btn = document.getElementById('phraseHistoryToggle');
      const chev = document.getElementById('phraseHistoryChevron');
      const collapsed = wrap.classList.toggle('is-collapsed');
      btn.setAttribute('aria-expanded', !collapsed);
      btn.classList.toggle('is-shrunk', collapsed);
      chev.textContent = collapsed ? '▶' : '▼';
    }

    document.getElementById('phraseHistoryToggle').addEventListener('click', togglePhraseHistory);

    const RIBBON_LOCK_HOLD_MS = 1000;
    let ribbonLocked = false;
    let ribbonLockHoldTimer = null;
    let ribbonLockKeyDownAt = 0;

    function applyRibbonLock() {
      const main = document.querySelector('.app-main');
      const btn = document.getElementById('ribbonLockBtn');
      if (!main || !btn) return;
      main.classList.toggle('ribbon-locked', ribbonLocked);
      btn.textContent = ribbonLocked ? '\u{1F513}' : '\u{1F512}';
      btn.title = ribbonLocked ? 'Hold 1 second to unlock' : 'Hold 1 second to lock screen';
      btn.setAttribute(
        'aria-label',
        ribbonLocked
          ? 'Screen is locked. Hold one second to unlock.'
          : 'Hold one second to lock the main screen and prevent accidental touches.'
      );
      btn.setAttribute('aria-pressed', ribbonLocked ? 'true' : 'false');
    }

    function clearRibbonLockHoldTimer() {
      if (ribbonLockHoldTimer) {
        clearTimeout(ribbonLockHoldTimer);
        ribbonLockHoldTimer = null;
      }
      const b = document.getElementById('ribbonLockBtn');
      if (b) b.classList.remove('ribbon-lock-pressing');
    }

    function onRibbonLockPointerDown(e) {
      if (e.button !== 0 && e.button != null) return;
      const btn = e.currentTarget;
      btn.classList.add('ribbon-lock-pressing');
      clearRibbonLockHoldTimer();
      ribbonLockHoldTimer = setTimeout(() => {
        ribbonLockHoldTimer = null;
        ribbonLocked = !ribbonLocked;
        applyRibbonLock();
        btn.classList.remove('ribbon-lock-pressing');
      }, RIBBON_LOCK_HOLD_MS);
    }

    function onRibbonLockPointerEnd() {
      clearRibbonLockHoldTimer();
    }

    function initRibbonLock() {
      const btn = document.getElementById('ribbonLockBtn');
      if (!btn) return;
      btn.addEventListener('pointerdown', onRibbonLockPointerDown);
      btn.addEventListener('pointerup', onRibbonLockPointerEnd);
      btn.addEventListener('pointercancel', onRibbonLockPointerEnd);
      btn.addEventListener('pointerleave', onRibbonLockPointerEnd);
      btn.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        if (e.key !== ' ' && e.key !== 'Enter') return;
        e.preventDefault();
        ribbonLockKeyDownAt = Date.now();
        btn.classList.add('ribbon-lock-pressing');
      });
      btn.addEventListener('keyup', (e) => {
        if (e.key !== ' ' && e.key !== 'Enter') return;
        btn.classList.remove('ribbon-lock-pressing');
        const start = ribbonLockKeyDownAt;
        ribbonLockKeyDownAt = 0;
        if (start && Date.now() - start >= RIBBON_LOCK_HOLD_MS) {
          ribbonLocked = !ribbonLocked;
          applyRibbonLock();
        }
      });
    }

    initRibbonLock();

    // --- History loading and rendering ---

    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        if (!res.ok) return;
        const data = await res.json();
        historyItems = data.items || [];
        buildHistoryChips();
        if (historyItems.length > 0) {
          renderFromHistory(historyItems[0]);
        }
        renderHistoryStrip();
      } catch (e) {
        // Server not reachable — emoji fallback already shown by _generateStoryboardOffline()
      }
    }

    function buildHistoryChips() {
      const row = document.getElementById('quickButtons');
      row.innerHTML = '';
      historyItems.slice(0, 10).forEach(item => {
        const label = item.original_text.length > 30
          ? item.original_text.slice(0, 27) + '\u2026'
          : item.original_text;
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.onclick = () => renderFromHistory(item);
        row.appendChild(btn);
      });
    }

    function renderFromHistory(item) {
      document.getElementById('phraseInput').value = item.original_text;
      setAppStatus('', false);
      // Keep currentScenario compatible with saveCurrentActivity
      currentScenario = {
        activityEmoji: '🖼️',
        activityLabel: (item.simplified_message || item.original_text).slice(0, 30),
        panels: item.cards.map(c => ({ emoji: '🖼️', caption: c.scene_label, spoken: '' })),
        choices: []
      };
      renderPanels(item.cards, {source_id: item.source_id, label: item.simplified_message || item.original_text});
      document.getElementById('choices').innerHTML = '';
    }

    function renderPanels(cards, dragContext) {
      const storyboard = document.getElementById('storyboard');
      const cols = Math.min(Math.max(cards.length, 1), 4);
      storyboard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      storyboard.innerHTML = '';
      cards.forEach((card, index) => {
        const div = document.createElement('div');
        div.className = 'panel';
        if (dragContext) {
          div.draggable = true;
          div.style.cursor = 'grab';
          const payload = JSON.stringify({
            source_id: dragContext.source_id,
            image_url: card.image_url || null,
            label: dragContext.label,
          });
          div.addEventListener('dragstart', e => {
            e.dataTransfer.setData('application/json', payload);
          });
        }
        const sceneHtml = card.image_url
          ? `<img src="${card.image_url}" alt="${card.scene_label}" class="panel-img" draggable="false">`
          : `<div class="scene">${card.emoji || '🖼\uFE0F'}</div>`;
        div.innerHTML = `
          <div class="step">Step ${index + 1}</div>
          ${sceneHtml}
          <div class="caption">${card.scene_label || card.caption || ''}</div>
        `;
        storyboard.appendChild(div);
      });
    }

    function renderHistoryStrip() {
      const strip = document.getElementById('historyStrip');
      strip.innerHTML = '';
      historyItems.slice(0, 10).forEach(item => {
        const firstCard = item.cards[0];
        if (!firstCard) return;

        const card = document.createElement('div');
        card.className = 'history-strip-card';
        card.draggable = true;

        const payload = JSON.stringify({
          source_id: item.source_id,
          image_url: firstCard.image_url || null,
          label: item.simplified_message || item.original_text,
        });
        card.addEventListener('dragstart', e => {
          e.dataTransfer.setData('application/json', payload);
        });

        const label = (item.simplified_message || item.original_text).slice(0, 35);
        card.innerHTML = firstCard.image_url
          ? `<img src="${firstCard.image_url}" alt="${firstCard.scene_label}" draggable="false">
             <div class="history-strip-label">${label}</div>`
          : `<div style="font-size:36px;margin-bottom:6px">\uD83D\uDDBC\uFE0F</div>
             <div class="history-strip-label">${label}</div>`;

        strip.appendChild(card);
      });
    }

    const visualVocabulary = {
      lawn: { emoji: '🌱🏡', label: 'Lawn was mowed' },
      mow: { emoji: '🌱🏡', label: 'Lawn was mowed' },
      mowing: { emoji: '🌱🏡', label: 'Lawn was mowed' },
      gardener: { emoji: '👨‍🌾', label: 'Lawn worker' },
      guy: { emoji: '👨‍🌾', label: 'Lawn worker' },
      pay: { emoji: '💵', label: 'Pay money' },
      check: { emoji: '🧾✍️', label: 'Write check' },
      checkbook: { emoji: '📒❓', label: 'Find checkbook' },
      fifty: { emoji: '💵50', label: '$50' },
      plumber: { emoji: '👷‍♂️🚪', label: 'Worker coming' },
      kitchen: { emoji: '🍽️🏠', label: 'Go to kitchen' },
      lunch: { emoji: '🍲❓', label: 'Do you want lunch?' },
      medicine: { emoji: '💊🥤', label: 'Take medicine' },
      car: { emoji: '🚗', label: 'Go to car' },
      coat: { emoji: '🧥', label: 'Bring coat' }
    };

    const scenarioRules = [
      {
        name: 'pay_lawn_worker',
        activityEmoji: '👨‍🌾💵📒',
        activityLabel: 'Pay lawn guy',
        test: text => includesAny(text, ['lawn', 'mow', 'mowing']) && includesAny(text, ['pay', 'check', 'checkbook', '$50', '50']),
        meaning: 'The lawn worker mowed the lawn. We need to pay him $50. We need to find the checkbook and write a check.',
        panels: [
          { emoji: '👨‍🌾🌱', caption: 'Lawn worker mowed', spoken: 'He worked on the lawn.' },
          { emoji: '💵50', caption: 'Pay $50', spoken: 'We need to pay him fifty dollars.' },
          { emoji: '📒✍️❓', caption: 'Find checkbook', spoken: 'Where is your checkbook?' }
        ],
        choices: ['I know', 'Help me find it', 'Not now']
      },
      {
        name: 'lunch',
        activityEmoji: '🍲❓',
        activityLabel: 'Lunch',
        test: text => includesAny(text, ['lunch', 'food', 'eat']),
        meaning: 'I am asking if you want lunch now.',
        panels: [
          { emoji: '👩‍🦳', caption: 'You', spoken: 'This is for you.' },
          { emoji: '🍲', caption: 'Lunch', spoken: 'Lunch is ready.' },
          { emoji: '❓', caption: 'Do you want it?', spoken: 'Do you want lunch?' }
        ],
        choices: ['Yes', 'No']
      },
      {
        name: 'plumber_move',
        activityEmoji: '👷‍♂️➡️🍽️',
        activityLabel: 'Move for worker',
        test: text => includesAny(text, ['plumber']) || (includesAny(text, ['worker', 'coming']) && includesAny(text, ['kitchen', 'move'])),
        meaning: 'A worker is coming to the house. We need to move together to the kitchen.',
        panels: [
          { emoji: '👷‍♂️🚪', caption: 'Worker coming', spoken: 'A worker is coming inside.' },
          { emoji: '🚶‍♀️➡️🚶', caption: 'We move together', spoken: 'We need to move now.' },
          { emoji: '🍽️🏠', caption: 'Go to kitchen', spoken: 'We are going to the kitchen.' }
        ],
        choices: ['Okay', 'Wait', 'Help me']
      },
      {
        name: 'medicine',
        activityEmoji: '💊🥤',
        activityLabel: 'Take medicine',
        test: text => includesAny(text, ['medicine', 'pill', 'medication']),
        meaning: 'It is time to take medicine with water.',
        panels: [
          { emoji: '⏰', caption: 'It is time', spoken: 'It is time now.' },
          { emoji: '💊', caption: 'Medicine', spoken: 'Take your medicine.' },
          { emoji: '🥤', caption: 'With water', spoken: 'Take it with water.' }
        ],
        choices: ['Done', 'Help', 'Later']
      },
      {
        name: 'car',
        activityEmoji: '🧥🚗',
        activityLabel: 'Go to car',
        test: text => includesAny(text, ['car', 'drive']) || (includesAny(text, ['go']) && includesAny(text, ['coat'])),
        meaning: 'We are getting ready and going to the car.',
        panels: [
          { emoji: '🧥', caption: 'Get coat', spoken: 'Please bring your coat.' },
          { emoji: '🚶➡️🚗', caption: 'Walk to car', spoken: 'We are walking to the car.' },
          { emoji: '🚗', caption: 'Get in car', spoken: 'We are leaving now.' }
        ],
        choices: ['Ready', 'Need help', 'Wait']
      }
    ];

    function includesAny(text, terms) {
      return terms.some(term => text.includes(term));
    }

    function setPhrase(text) {
      document.getElementById('phraseInput').value = text;
      generateStoryboard();
    }

    function extractAmount(text) {
      const dollarMatch = text.match(/\$\s?(\d+)/);
      if (dollarMatch) return '$' + dollarMatch[1];
      const numberMatch = text.match(/\b(\d+)\s?dollars?\b/);
      if (numberMatch) return '$' + numberMatch[1];
      return null;
    }

    function buildDynamicFallback(text) {
      const words = text.toLowerCase().replace(/[^a-z0-9$\s]/g, '').split(/\s+/);
      const hits = [];

      words.forEach(word => {
        if (visualVocabulary[word] && !hits.find(h => h.label === visualVocabulary[word].label)) {
          hits.push(visualVocabulary[word]);
        }
      });

      const amount = extractAmount(text);
      if (amount && !hits.find(h => h.label === amount)) {
        hits.push({ emoji: '💵' + amount.replace('$', ''), label: amount });
      }

      while (hits.length < 3) {
        hits.push({ emoji: ['🎤', '🧠', '🖼️'][hits.length], label: ['I heard you', 'Simple meaning', 'Show picture'][hits.length] });
      }

      return {
        name: 'custom',
        activityEmoji: hits.slice(0, 3).map(h => h.emoji).join(''),
        activityLabel: hits[0].label,
        meaning: 'Prototype found important words and built a simple 3-step picture message. A future AI layer would simplify this more intelligently.',
        panels: hits.slice(0, 3).map(hit => ({ emoji: hit.emoji, caption: hit.label, spoken: hit.label })),
        choices: ['Yes', 'No', 'Help']
      };
    }

    async function generateStoryboard() {
      const rawText = document.getElementById('phraseInput').value.trim();
      if (!rawText) return;

      setAppStatus('Generating storyboard… (about 20–30 seconds)', false);
      document.getElementById('storyboard').innerHTML = '';
      document.getElementById('choices').innerHTML = '';

      let data;
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text: rawText}),
        });
        data = await res.json();
        if (!res.ok) {
          setAppStatus('Error: ' + (data.error || 'Unknown error from server.'), true);
          return;
        }
      } catch (e) {
        setAppStatus('Error: Could not reach server. ' + e.message, true);
        return;
      }

      // Render and prepend to history
      renderFromHistory(data);
      historyItems.unshift(data);
      buildHistoryChips();
      renderHistoryStrip();
    }

    function _generateStoryboardOffline() {
      const rawText = document.getElementById('phraseInput').value.trim();
      const text = rawText.toLowerCase();
      const scenario = scenarioRules.find(rule => rule.test(text)) || buildDynamicFallback(rawText);
      currentScenario = scenario;

      setAppStatus('', false);

      const storyboard = document.getElementById('storyboard');
      storyboard.innerHTML = '';

      scenario.panels.forEach((panel, index) => {
        const div = document.createElement('div');
        div.className = 'panel';
        div.innerHTML = `
          <div class="step">Step ${index + 1}</div>
          <div class="scene">${panel.emoji}</div>
          <div>
            <div class="caption">${panel.caption}</div>
            <div class="spoken">${panel.spoken}</div>
          </div>
        `;
        storyboard.appendChild(div);
      });

      document.getElementById('choices').innerHTML = `
        <div class="choice-row">
          ${scenario.choices.map(choice => `<div class="choice">${choice}</div>`).join('')}
        </div>
      `;
    }

    function createActivityCard(activity) {
      const card = document.createElement('div');
      card.className = 'activity-card';
      card.id = activity.id;
      card.draggable = true;
      card.ondragstart = dragActivity;
      const thumbHtml = activity.image_url
        ? `<img src="${activity.image_url}" alt="${activity.label}" class="activity-thumb" draggable="false">`
        : `<div class="activity-emoji">${activity.emoji || '🖼\uFE0F'}</div>`;
      card.innerHTML = `
        ${thumbHtml}
        <div class="activity-label">${activity.label}</div>
      `;
      return card;
    }

    function dragActivity(event) {
      event.dataTransfer.setData('text/plain', event.currentTarget.id);
    }

    function allowDrop(event) {
      event.preventDefault();
      const slot = event.currentTarget;
      if (slot.classList.contains('slot')) slot.classList.add('drag-over');
    }

    function leaveDrop(event) {
      event.currentTarget.classList.remove('drag-over');
    }

    function dropActivity(event, targetId) {
      event.preventDefault();
      const target = document.getElementById(targetId);
      target.classList.remove('drag-over');

      // Panel drag — payload is JSON with {source_id, image_url, label}
      const jsonPayload = event.dataTransfer.getData('application/json');
      if (jsonPayload) {
        let payload;
        try { payload = JSON.parse(jsonPayload); } catch (e) { return; }
        activityCounter += 1;
        const activity = {
          id: 'activity-' + activityCounter,
          image_url: payload.image_url || null,
          emoji: '🖼\uFE0F',
          label: (payload.label || 'Activity').slice(0, 25),
        };
        const helper = target.querySelector('.slot-help');
        if (helper) helper.style.display = 'none';
        target.appendChild(createActivityCard(activity));
        return;
      }

      // Activity-card drag — payload is element id string
      const cardId = event.dataTransfer.getData('text/plain');
      const card = document.getElementById(cardId);
      if (!card) return;
      const helper = target.querySelector('.slot-help');
      if (helper) helper.style.display = 'none';
      target.appendChild(card);
    }

    function resetPlanner() {
      ['morningSlot', 'afternoonSlot', 'eveningSlot'].forEach(id => {
        const slot = document.getElementById(id);
        const helpText = id === 'morningSlot' ? 'Morning' : id === 'afternoonSlot' ? 'Afternoon' : 'Evening';
        slot.innerHTML = `<div class="slot-title">${helpText}</div><div class="slot-help">Drop activity here</div>`;
      });
    }

    _generateStoryboardOffline(); // immediate emoji fallback while history loads
    loadHistory();               // async — renders gallery and real PNG cards when server responds

    function startSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const status = document.getElementById('speechStatus');

      if (!SpeechRecognition) {
        status.textContent = 'Speech not supported in this browser.';
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onstart = () => { status.textContent = 'Listening...'; };

      recognition.onresult = (event) => {
        status.textContent = 'Heard speech.';
        document.getElementById('phraseInput').value = event.results[0][0].transcript;
        generateStoryboard();
      };

      recognition.onerror = (event) => {
        status.textContent = 'Error: ' + event.error;
      };

      recognition.onend = () => {
        if (status.textContent === 'Listening...') status.textContent = '';
      };

      recognition.start();
    }
  </script>
</body>
